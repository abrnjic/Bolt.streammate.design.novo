<!--
  Android Adaptive Icon — FOREGROUND LAYER
  ─────────────────────────────────────────
  Canvas:    108dp × 108dp (Android required size)
  Safe zone: 72dp centered → from (18,18) to (90,90)
  All visual content must stay within the safe zone.

  Export targets (PNG, from this SVG):
    mipmap-mdpi    :  48×48 px
    mipmap-hdpi    :  72×72 px
    mipmap-xhdpi   :  96×96 px
    mipmap-xxhdpi  : 144×144 px
    mipmap-xxxhdpi : 192×192 px
    Play Store     : 512×512 px

  Background colour is defined in ic_launcher_background.svg.
  This layer should be exported with a TRANSPARENT background.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="108" height="108">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@700&amp;display=swap');</style>
  </defs>

  <!-- Transparent background (foreground layer — no fill) -->

  <!-- Icon box — stays within safe zone 18–90 -->
  <rect x="18" y="18" width="72" height="72" fill="#000a1e" fill-opacity="0.85" stroke="white" stroke-opacity="0.10" stroke-width="1"/>

  <!-- Top-left bracket (12dp arm) -->
  <polyline points="30,18 18,18 18,30" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Bottom-right bracket (12dp arm) -->
  <polyline points="78,90 90,90 90,78" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- S letter centered in safe zone -->
  <text
    x="54" y="54"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Barlow, 'Arial Black', Arial, sans-serif"
    font-weight="700"
    font-size="38"
    fill="#00d4ff"
  >S</text>
</svg>
