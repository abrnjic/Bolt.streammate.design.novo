<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;600&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="#060b18"/>

  <!-- ── Icon Box (20,20 → 180,180 = 160×160) ── -->
  <rect x="20" y="20" width="160" height="160" fill="#000a1e" fill-opacity="0.85" stroke="white" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- Top-left bracket (28px arm) -->
  <polyline points="48,20 20,20 20,48" fill="none" stroke="#00d4ff" stroke-width="4" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Bottom-right bracket (28px arm) -->
  <polyline points="152,180 180,180 180,152" fill="none" stroke="#00d4ff" stroke-width="4" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- S letter -->
  <text
    x="100" y="100"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Barlow, 'Arial Black', Arial, sans-serif"
    font-weight="700"
    font-size="88"
    fill="#00d4ff"
  >S</text>

  <!-- ── Wordmark (starts at x=216) ── -->
  <!-- "Stream" — semibold, white -->
  <text
    x="216" y="100"
    dominant-baseline="central"
    font-family="Barlow, 'Helvetica Neue', Arial, sans-serif"
    font-weight="600"
    font-size="72"
    fill="white"
    letter-spacing="1"
  >Stream</text>

  <!-- "Mate" — light, white 60% opacity -->
  <text
    x="583" y="100"
    dominant-baseline="central"
    font-family="Barlow, 'Helvetica Neue', Arial, sans-serif"
    font-weight="300"
    font-size="72"
    fill="white"
    fill-opacity="0.6"
    letter-spacing="1"
  >Mate</text>
</svg>
